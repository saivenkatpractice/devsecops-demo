name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      matrix:
        language: [python]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  trivy:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: reports/trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"               # quoted string — correct for this action

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()                   # upload even on failure so you see results
        with:
          sarif_file: reports/trivy-results.sarif
          category: trivy-fs

  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [codeql, trivy, secret-scan]
    if: always()

    steps:
      - name: Evaluate security gates
        run: |
          echo "CodeQL:   ${{ needs.codeql.result }}"
          echo "Trivy:    ${{ needs.trivy.result }}"
          echo "Gitleaks: ${{ needs.secret-scan.result }}"

          if [[ "${{ needs.secret-scan.result }}" != "success" ]]; then
            echo "❌ CRITICAL: Secret detected — merge blocked"
            exit 1
          fi

          if [[ "${{ needs.codeql.result }}" != "success" ]]; then
            echo "❌ SAST found security issues"
            exit 1
          fi

          if [[ "${{ needs.trivy.result }}" != "success" ]]; then
            echo "❌ Vulnerable dependencies found"
            exit 1
          fi

          echo "✅ All security checks passed"