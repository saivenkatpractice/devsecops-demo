name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one Docker workflow runs at a time per branch
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-scan-push:
    name: Build → Scan → Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # needed to upload Trivy scan results to Security tab

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx ────────────────────────────────────────────
      # Buildx is a Docker CLI plugin for advanced builds (multi-platform, caching)
      # We need it for the cache-from/cache-to options below
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Generate image metadata ─────────────────────────────────────────
      # This action generates the image tag and labels automatically.
      # On push to main: tags the image as "latest" + the short Git SHA (e.g. abc1234)
      # On pull_request: tags as "pr-42" — we build+scan but DON'T push PRs
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-demo
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=ref,event=pr

      # ── 4. Log in to Docker Hub ────────────────────────────────────────────
      # Only log in on push to main (not on PRs — we don't push PR builds)
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Build image (don't push yet) ───────────────────────────────────
      # We build first into a local "docker-daemon" so Trivy can scan it.
      # We use GitHub Actions cache to speed up future builds.
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # load=true puts the image into the local Docker daemon (for Trivy)
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between workflow runs — speeds up builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Trivy image scan ────────────────────────────────────────────────
      # Scan the built image for OS + library vulnerabilities BEFORE pushing.
      # If CRITICAL or HIGH CVEs are found, the workflow fails here.
      # ── 6. Trivy image scan ────────────────────────────────────────────────
      - name: Scan image with Trivy (SARIF for Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: reports/trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      # Print human-readable results to the log so we can see what failed
      - name: Print Trivy results (human readable)
        if: failure()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

      # Upload scan results to GitHub Security tab (even if scan found issues)
      - name: Upload Trivy image scan to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/trivy-image.sarif
          category: trivy-image

      # ── 7. Push to Docker Hub ─────────────────────────────────────────────
      # Only push if: on main branch + Trivy scan passed
      - name: Push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 8. Print image digest ─────────────────────────────────────────────
      # The digest is a unique fingerprint (sha256:...) of what was pushed.
      # Useful for pinning exact versions in Terraform/ECS later.
      - name: Print image digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "✅ Image pushed successfully"
          echo "Tags: ${{ steps.meta.outputs.tags }}"